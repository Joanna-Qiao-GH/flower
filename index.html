<section id="activities" class="py-10 md:py-12 overflow-hidden">
  <div class="container-custom">
    <div class="text-center mb-8">
      <h2 class="text-3xl md:text-4xl font-bold mb-2">课程展示</h2>
    </div>
  </div>
  <!-- 滚动外层，强制横向裁切 -->
  <div class="w-full overflow-hidden">
    <!-- 滚动容器，flex不换行，动画平移 -->
    <div class="flex animate-scroll whitespace-nowrap" id="scrollBox"></div>
  </div>
</section>

<script>
const mediaFiles = [
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/1.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/2.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/3.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/4.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/5.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/6.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/7.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/8.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/9.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/10.jpg",
  "https://cdn.jsdelivr.net/gh/Joanna-Qiao-GH/flower/11.jpg",
];
const box = document.getElementById('scrollBox');
let html = '';
mediaFiles.forEach(url=>{
  html += url.endsWith('.mp4')
  ?`<div class="shrink-0 w-[260px] sm:w-[320px] mx-2 overflow-hidden"><video class="w-full h-[320px] sm:h-[420px] object-cover rounded-lg" autoplay muted loop playsinline src="${url}"></video></div>`
  :`<div class="shrink-0 w-[260px] sm:w-[320px] mx-2 overflow-hidden"><img src="${url}" class="w-full h-[320px] sm:h-[420px] object-cover rounded-lg" alt="花灯作品"></div>`;
})
// 双倍内容实现无缝循环
box.innerHTML = html + html;
</script>
